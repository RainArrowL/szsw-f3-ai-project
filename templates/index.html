<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年报财务数据获取工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 背景粒子效果 -->
    <div class="bg-particles" id="particles"></div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                    <path d="M14 15h3M14 18h2"/>
                </svg>
            </div>
            <h1>年报财务数据获取</h1>
            <p class="subtitle">上市公司历年三大财务报表 · 一键获取</p>
        </header>

        <!-- 双列功能模块 -->
        <div class="modules-grid">
            <!-- ========== 左列：年报财务数据获取 ========== -->
            <div class="module-card" id="annualModule">
                <div class="module-header">
                    <div class="module-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <line x1="9" y1="21" x2="9" y2="9"/>
                        </svg>
                    </div>
                    <div class="module-title-area">
                        <h2 class="module-title">年报数据爬取</h2>
                        <span class="module-badge">财务报表</span>
                    </div>
                </div>

                <form id="annualForm" class="module-form">
                    <!-- 年份选择 -->
                    <div class="form-row">
                        <label class="mini-label">年度范围</label>
                        <div class="year-range-compact">
                            <select id="startYear" required>
                                <option value="">--</option>
                            </select>
                            <span class="dash">&mdash;</span>
                            <select id="endYear" required>
                                <option value="">--</option>
                            </select>
                        </div>
                    </div>

                    <!-- 企业名单输入 -->
                    <div class="form-row">
                        <label class="mini-label">企业名单</label>
                        <textarea
                            id="textInput"
                            rows="3"
                            placeholder="输入企业名称或股票代码，用逗号或换行分隔&#10;例如：贵州茅台,600519&#10;      平安银行&#10;      000001"
                        >平安银行股份有限公司
招商银行股份有限公司
国银金融租赁股份有限公司
招商证券股份有限公司
国信证券股份有限公司
长城证券股份有限公司
第一创业证券股份有限公司
中信证券股份有限公司
中国平安保险（集团）股份有限公司
阳光保险集团股份有限公司</textarea>
                    </div>

                    <!-- 文件上传 -->
                    <div class="form-row">
                        <label class="mini-label">或上传名单</label>
                        <div class="upload-area" id="uploadArea">
                            <input type="file" id="fileInput" accept=".txt,.csv">
                            <div class="upload-content">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <polyline points="12 18 12 12 9 15"/>
                                    <line x1="12" y1="12" x2="15" y2="15"/>
                                </svg>
                                <span>拖拽 .txt/.csv 文件</span>
                            </div>
                            <div class="file-info" id="fileInfo" style="display:none;">
                                <span class="file-name" id="fileName"></span>
                                <button type="button" class="file-remove" id="fileRemove">&times;</button>
                            </div>
                        </div>
                    </div>

                    <!-- 行业均值开关 -->
                    <div class="toggle-row">
                        <span class="toggle-text">输出同行业企业均值</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="industryAvgToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>

                    <!-- 按钮 -->
                    <div class="form-actions">
                        <button type="submit" class="btn-primary btn-sm" id="annualSubmitBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            开始获取
                        </button>
                        <button type="button" class="btn-secondary btn-sm" id="annualResetBtn">清空</button>
                    </div>
                </form>

                <!-- 年报结果区域 -->
                <div class="module-result" id="annualResult" style="display:none;">
                    <div class="progress-section" id="annualProgress">
                        <div class="progress-header">
                            <span class="progress-label" id="annualProgressLabel">正在处理...</span>
                            <span class="progress-percent" id="annualProgressPercent">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="annualProgressFill"></div>
                        </div>
                        <p class="progress-message" id="annualProgressMessage"></p>
                    </div>
                    <div class="result-section" id="annualResultSection" style="display:none;">
                        <div class="result-status" id="annualResultStatus"></div>
                        <div class="file-list" id="annualFileList"></div>
                    </div>
                </div>
            </div>

            <!-- ========== 右列：公募基金管理人名录 ========== -->
            <div class="module-card" id="amacModule">
                <div class="module-header">
                    <div class="module-icon amac-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div class="module-title-area">
                        <h2 class="module-title">公募基金管理人名录</h2>
                        <span class="module-badge amac-badge">中基协</span>
                    </div>
                </div>

                <div class="amac-hero">
                    <div class="amac-icon-large">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="3"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <path d="M8 13h3M8 16h5M8 19h2"/>
                            <path d="M15 13l3 3M18 13l-3 3"/>
                        </svg>
                    </div>
                    <p class="amac-desc">从中国证券投资基金业协会<br>爬取公募基金管理人名录</p>
                    <p class="amac-hint">约165家机构 · 一键导出Excel</p>
                </div>

                <form id="amacForm" class="module-form">
                    <div class="form-actions amac-actions">
                        <button type="submit" class="btn-primary btn-sm" id="amacSubmitBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            开始获取
                        </button>
                    </div>
                </form>

                <!-- 名录结果区域 -->
                <div class="module-result" id="amacResult" style="display:none;">
                    <div class="progress-section" id="amacProgress">
                        <div class="progress-header">
                            <span class="progress-label" id="amacProgressLabel">正在爬取...</span>
                            <span class="progress-percent" id="amacProgressPercent">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="amacProgressFill"></div>
                        </div>
                        <p class="progress-message" id="amacProgressMessage"></p>
                    </div>
                    <div class="result-section" id="amacResultSection" style="display:none;">
                        <div class="result-status" id="amacResultStatus"></div>
                        <div class="file-list" id="amacFileList"></div>
                    </div>
                </div>
            </div>

            <!-- ========== 第三列：深交所日度概况 ========== -->
            <div class="module-card" id="szseModule">
                <div class="module-header">
                    <div class="module-icon szse-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                    </div>
                    <div class="module-title-area">
                        <h2 class="module-title">深交所日度概况</h2>
                        <span class="module-badge szse-badge">深交所</span>
                    </div>
                </div>

                <div class="szse-hero">
                    <div class="szse-icon-large">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="3" y1="9" x2="21" y2="9"/>
                            <polyline points="8 13 10 16 13 12 16 15 18 13"/>
                        </svg>
                    </div>
                    <p class="szse-desc">从深圳证券交易所<br>爬取日度成交概况数据</p>
                    <p class="szse-hint">深市合计 · 成交量 · 成交金额</p>
                </div>

                <form id="szseForm" class="module-form">
                    <div class="form-row">
                        <label class="mini-label">年度选择</label>
                        <select id="szseYear" class="year-select-single">
                            <!-- JS 动态填充 -->
                        </select>
                    </div>
                    <div class="form-actions szse-actions">
                        <button type="submit" class="btn-primary btn-sm" id="szseSubmitBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            开始获取
                        </button>
                    </div>
                </form>

                <!-- 深交所结果区域 -->
                <div class="module-result" id="szseResult" style="display:none;">
                    <div class="progress-section" id="szseProgress">
                        <div class="progress-header">
                            <span class="progress-label" id="szseProgressLabel">正在爬取...</span>
                            <span class="progress-percent" id="szseProgressPercent">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="szseProgressFill"></div>
                        </div>
                        <p class="progress-message" id="szseProgressMessage"></p>
                    </div>
                    <div class="result-section" id="szseResultSection" style="display:none;">
                        <div class="result-status" id="szseResultStatus"></div>
                        <div class="file-list" id="szseFileList"></div>
                    </div>
                </div>
            </div>

            <!-- ========== 第四列：分红公告查询 ========== -->
            <div class="module-card" id="dividendModule">
                <div class="module-header">
                    <div class="module-icon dividend-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </div>
                    <div class="module-title-area">
                        <h2 class="module-title">分红公告查询</h2>
                        <span class="module-badge dividend-badge">现金分红</span>
                    </div>
                </div>

                <form id="dividendForm" class="module-form">
                    <div class="form-row">
                        <label class="mini-label">年度范围</label>
                        <div class="year-range-compact">
                            <select id="dividendStartYear" required>
                                <option value="">--</option>
                            </select>
                            <span class="dash">&mdash;</span>
                            <select id="dividendEndYear" required>
                                <option value="">--</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <label class="mini-label">企业名单</label>
                        <textarea
                            id="dividendTextInput"
                            rows="3"
                            placeholder="输入企业名称或股票代码，用逗号或换行分隔"
                        >平安银行股份有限公司
招商银行股份有限公司
国银金融租赁股份有限公司
招商证券股份有限公司
国信证券股份有限公司
长城证券股份有限公司
第一创业证券股份有限公司
中信证券股份有限公司
中国平安保险（集团）股份有限公司
阳光保险集团股份有限公司</textarea>
                    </div>

                    <div class="form-row">
                        <label class="mini-label">或上传名单</label>
                        <div class="upload-area" id="dividendUploadArea">
                            <input type="file" id="dividendFileInput" accept=".txt,.csv">
                            <div class="upload-content">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <polyline points="12 18 12 12 9 15"/>
                                    <line x1="12" y1="12" x2="15" y2="15"/>
                                </svg>
                                <span>拖拽 .txt/.csv 文件</span>
                            </div>
                            <div class="file-info" id="dividendFileInfo" style="display:none;">
                                <span class="file-name" id="dividendFileName"></span>
                                <button type="button" class="file-remove" id="dividendFileRemove">&times;</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions dividend-actions">
                        <button type="submit" class="btn-primary btn-sm" id="dividendSubmitBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            开始获取
                        </button>
                    </div>
                </form>

                <div class="module-result" id="dividendResult" style="display:none;">
                    <div class="progress-section" id="dividendProgress">
                        <div class="progress-header">
                            <span class="progress-label" id="dividendProgressLabel">正在处理...</span>
                            <span class="progress-percent" id="dividendProgressPercent">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="dividendProgressFill"></div>
                        </div>
                        <p class="progress-message" id="dividendProgressMessage"></p>
                    </div>
                    <div class="result-section" id="dividendResultSection" style="display:none;">
                        <div class="result-status" id="dividendResultStatus"></div>
                        <div class="file-list" id="dividendFileList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
