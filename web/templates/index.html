<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智览金融 财数贯通</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="bg-particles" id="particles"></div>

    <div class="app">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                    <path d="M14 15h3M14 18h2"/>
                </svg>
                <h1>智览金融 财数贯通</h1>
            </div>
            <span class="header-sub">上市公司财务数据 · 一站式获取</span>
        </header>

        <!-- 标签导航 -->
        <nav class="tabs">
            <button class="tab active" data-tab="annual">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                <span>年报数据</span>
            </button>
            <button class="tab" data-tab="institution">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                <span>机构名录</span>
            </button>
            <button class="tab" data-tab="szse">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>深交所概况</span>
            </button>
            <button class="tab" data-tab="dividend">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span>分红查询</span>
            </button>
            <button class="tab" data-tab="penalty">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>处罚信息</span>
            </button>
        </nav>

        <!-- 主体：左侧表单 + 右侧结果 -->
        <main class="main">
            <!-- 左侧：操作面板 -->
            <aside class="panel-form">
                <!-- ========== 年报数据 ========== -->
                <div class="tab-panel active" id="panel-annual">
                    <form id="annualForm">
                        <div class="form-group">
                            <label class="form-label">年度范围</label>
                            <div class="year-range">
                                <select id="startYear" required></select>
                                <span class="dash">&mdash;</span>
                                <select id="endYear" required></select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">企业名单</label>
                            <textarea id="textInput" rows="3" placeholder="输入企业名称或股票代码，逗号或换行分隔">平安银行股份有限公司
招商银行股份有限公司
国银金融租赁股份有限公司
招商证券股份有限公司
国信证券股份有限公司
长城证券股份有限公司
第一创业证券股份有限公司
中信证券股份有限公司
中国平安保险（集团）股份有限公司
阳光保险集团股份有限公司</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">或上传名单</label>
                            <div class="upload-zone" id="uploadArea">
                                <input type="file" id="fileInput" accept=".txt,.csv">
                                <div class="upload-placeholder" id="uploadPlaceholder">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    <span>拖拽 .txt/.csv 文件</span>
                                </div>
                                <div class="upload-file" id="fileInfo" style="display:none;">
                                    <span id="fileName"></span>
                                    <button type="button" id="fileRemove">&times;</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="toggle-row">
                                <span>输出同行业企业均值</span>
                                <span class="toggle">
                                    <input type="checkbox" id="industryAvgToggle">
                                    <span class="toggle-knob"></span>
                                </span>
                            </label>
                            <label class="toggle-row">
                                <span>按报表类型合并输出</span>
                                <span class="toggle">
                                    <input type="checkbox" id="mergeReportsToggle">
                                    <span class="toggle-knob"></span>
                                </span>
                            </label>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn" id="annualSubmitBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                开始获取
                            </button>
                            <button type="button" class="btn btn-outline" id="annualResetBtn">清空</button>
                        </div>
                    </form>
                </div>

                <!-- ========== 机构名录 ========== -->
                <div class="tab-panel" id="panel-institution">
                    <form id="institutionForm">
                        <div class="form-group">
                            <label class="form-label">选择需要获取的名录</label>
                            <label class="toggle-row">
                                <span>公募基金管理人名录</span>
                                <span class="toggle">
                                    <input type="checkbox" class="inst-checkbox" id="instAmac" checked>
                                    <span class="toggle-knob"></span>
                                </span>
                            </label>
                            <label class="toggle-row">
                                <span>银行保险法人名单</span>
                                <span class="toggle">
                                    <input type="checkbox" class="inst-checkbox" id="instBankIns">
                                    <span class="toggle-knob"></span>
                                </span>
                            </label>
                            <label class="toggle-row">
                                <span>证券基金公司名单</span>
                                <span class="toggle">
                                    <input type="checkbox" class="inst-checkbox" id="instSecFund">
                                    <span class="toggle-knob"></span>
                                </span>
                            </label>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn" id="institutionSubmitBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                开始获取
                            </button>
                        </div>
                    </form>
                </div>

                <!-- ========== 深交所概况 ========== -->
                <div class="tab-panel" id="panel-szse">
                    <form id="szseForm">
                        <div class="form-group">
                            <label class="form-label">年度选择</label>
                            <select id="szseYear" class="select-full"></select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn" id="szseSubmitBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                开始获取
                            </button>
                        </div>
                    </form>
                </div>

                <!-- ========== 分红查询 ========== -->
                <div class="tab-panel" id="panel-dividend">
                    <form id="dividendForm">
                        <div class="form-group">
                            <label class="form-label">年度范围</label>
                            <div class="year-range">
                                <select id="dividendStartYear" required></select>
                                <span class="dash">&mdash;</span>
                                <select id="dividendEndYear" required></select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">企业名单</label>
                            <textarea id="dividendTextInput" rows="3" placeholder="输入企业名称或股票代码，逗号或换行分隔">平安银行股份有限公司
招商银行股份有限公司
国银金融租赁股份有限公司
招商证券股份有限公司
国信证券股份有限公司
长城证券股份有限公司
第一创业证券股份有限公司
中信证券股份有限公司
中国平安保险（集团）股份有限公司
阳光保险集团股份有限公司</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">或上传名单</label>
                            <div class="upload-zone" id="dividendUploadArea">
                                <input type="file" id="dividendFileInput" accept=".txt,.csv">
                                <div class="upload-placeholder" id="dividendUploadPlaceholder">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    <span>拖拽 .txt/.csv 文件</span>
                                </div>
                                <div class="upload-file" id="dividendFileInfo" style="display:none;">
                                    <span id="dividendFileName"></span>
                                    <button type="button" id="dividendFileRemove">&times;</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn" id="dividendSubmitBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                开始获取
                            </button>
                        </div>
                    </form>
                </div>

                <!-- ========== 处罚信息 ========== -->
                <div class="tab-panel" id="panel-penalty">
                    <form id="penaltyForm">
                        <p class="panel-desc">从国家金融监督管理总局和证监会官网获取最新行政处罚信息。</p>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-danger" id="penaltySubmitBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                开始获取
                            </button>
                        </div>
                    </form>
                </div>
            </aside>

            <!-- 右侧：结果面板 -->
            <section class="panel-results" id="resultsPanel">
                <div class="results-header">
                    <h3>任务结果</h3>
                    <span class="results-count" id="resultsCount"></span>
                </div>
                <div class="results-empty" id="resultsEmpty">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <p>暂无任务结果</p>
                    <span>选择左侧功能模块，提交任务后将在此显示结果</span>
                </div>
                <div class="results-list" id="resultsList"></div>
            </section>
        </main>
    </div>

    <script src="/static/js/script.js?v=20260701"></script>
</body>
</html>
